            --dialogue-bottom: 3vh;

            --dialogue-max-height: 31vh;
            --dialogue-bg: rgba(255, 248, 232, 0.96);
            --dialogue-border: #b51f2a;
            --dialogue-radius: 20px;
            --dialogue-shadow: 0 16px 48px rgba(0, 0, 0, 0.38);

            --text-color: #281812;
            --objective-color: #1f6b3a;
            --task-bg: #fff8e8;
            --task-border: #b51f2a;

<script src="reveal.js/dist/reveal.js"></script>
<script src="revealjs-cscape.js"></script>

<script>
    (() => {
        let storyPlayerName = "Spieler";
        let playerNameLoaded = false;

        async function fetchWithTimeout(url, timeoutMs = 3000) {
            const controller = new AbortController();
            const timeout = window.setTimeout(() => controller.abort(), timeoutMs);

            try {
                return await fetch(url, {
                    signal: controller.signal,
                    cache: "no-store"
                });
            } finally {
                window.clearTimeout(timeout);
            }
        }

        async function loadPlayerNameFromDataStore() {
            if (playerNameLoaded) return storyPlayerName;

            try {
                const response = await fetchWithTimeout("http://localhost:5000/game_data_store", 3000);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                const name = String(data.name || data.player || data.playerName || "").trim();
                storyPlayerName = name || "Spieler";
            } catch (error) {
                console.warn("[CSCAPE] Could not load player name from data store:", error.message);
                storyPlayerName = "Spieler";
            }

            playerNameLoaded = true;
            return storyPlayerName;
        }

        function formatStoryText(text) {
            return String(text || "").replaceAll("{player}", storyPlayerName || "Spieler");
        }

        window.CSCAPE_STORY = {
            blockNavigationUntilReady: true,
            ttsUrl: "http://localhost:8765/tts",
            defaultVoice: "de-DE-KatjaNeural",
            defaultTtsRate: "+0%",
            defaultTtsPitch: "+0Hz",

            defaultMusic: "sounds/christmas.mp3",

            musicVolume: 0.24,
            soundVolume: 0.82,
            typeSpeed: 24,
            defaultLayout: "dialogue",
            defaultTextMode: "type",
            audioHintText: "Klick für Musik & Sounds",

            formatText: formatStoryText,

            async beforeSlide() {
                await loadPlayerNameFromDataStore();
            }
        };
    })();
</script>

<script src="story-styles/cscape-story.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        window.CSCAPE_STORY_API.init();

        Reveal.initialize({
            hash: false,
            controls: false,
            progress: false,
            transition: "none",
            center: false,
            keyboard: {
                27: () => alert("Close with Ctrl+W"),
                83: null
            },
            plugins: [
                RevealCscape
            ]
        });
    });
</script>
